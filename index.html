<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Monitorización de Supervivencia</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', Roboto, sans-serif;
            background-color: #121212;
            color: #ffffff;
            overflow: hidden;
        }
        #map {
            width: 100vw;
            height: 100vh;
        }
        .controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            gap: 15px;
            background: rgba(30, 30, 30, 0.85);
            padding: 15px 25px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .btn {
            background: #4caf50;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.4);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn:hover {
            background: #45a049;
            transform: translateY(-2px);
        }
        .btn-location {
            background: #2196F3;
            box-shadow: 0 4px 15px rgba(33, 150, 243, 0.4);
        }
        .btn-location:hover {
            background: #1e88e5;
        }
        input[type="file"] {
            display: none;
        }
        /* Popup custom styling */
        .leaflet-popup-content-wrapper {
            background: #1e1e1e;
            color: #e0e0e0;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .leaflet-popup-tip {
            background: #1e1e1e;
        }
        .popup-content h3 {
            margin: 0 0 10px 0;
            color: #4caf50;
            font-size: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 5px;
        }
        .popup-content p {
            margin: 5px 0;
            font-size: 14px;
            line-height: 1.4;
        }
        .popup-content strong {
            color: #ffffff;
        }
        /* Custom markers */
        .user-marker {
            background: #2196F3;
            border: 3px solid white;
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(33, 150, 243, 0.8);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(33, 150, 243, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(33, 150, 243, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(33, 150, 243, 0); }
        }
        #gps-status {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(30, 30, 30, 0.9);
            color: #fff;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.1);
            max-width: 90%;
            text-align: center;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ff9800; /* pending */
        }
        .status-dot.active { background: #4caf50; }
        .status-dot.error { background: #f44336; }
    </style>
</head>
<body>
    <div id="gps-status">
        <div class="status-dot" id="gps-dot"></div>
        <span id="gps-text">Buscando señal GPS...</span>
    </div>
    <div id="map"></div>
    
    <div class="controls">
        <label class="btn" for="csvFileInput">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
            Cargar CSV
        </label>
        <input type="file" id="csvFileInput" accept=".csv" />
        
        <button class="btn btn-location" id="btnLocation">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="3"></circle></svg>
            Centrar
        </button>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <!-- PapaParse for CSV parsing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <script>
        // Inicializar el mapa
        const map = L.map('map', {
            zoomControl: false
        }).setView([38.285, -0.758], 15);

        L.control.zoom({
            position: 'topright'
        }).addTo(map);

        // Capa de satélite para máximo detalle (Esri World Imagery)
        const satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Tiles &copy; Esri &mdash; Source: Esri, i-cubed, USDA, USGS, AEX, GeoEye, Getmapping, Aerogrid, IGN, IGP, UPR-EGP, and the GIS User Community',
            maxZoom: 19
        });
        
        satelliteLayer.addTo(map);

        let userMarker = null;
        let userCircle = null;
        let watchId = null;
        let markersLayer = L.featureGroup().addTo(map);

        // Icono para las siembras
        const seedIcon = L.divIcon({
            className: 'custom-div-icon',
            html: `<div style="background-color:#4caf50;width:12px;height:12px;border-radius:50%;border:2px solid white;box-shadow:0 0 5px rgba(0,0,0,0.5);"></div>`,
            iconSize: [16, 16],
            iconAnchor: [8, 8]
        });

        // Geolocalización en tiempo real
        const gpsDot = document.getElementById('gps-dot');
        const gpsText = document.getElementById('gps-text');

        function updateGpsStatus(status, message) {
            gpsDot.className = 'status-dot ' + status;
            gpsText.innerText = message;
        }

        function startTracking() {
            if (window.location.protocol === 'file:') {
                updateGpsStatus('error', 'Error: Chrome Android bloquea el GPS al abrir archivos locales (file://). Usa un servidor web (ej. GitHub Pages).');
                // Intentamos de todas formas, pero avisamos.
            }

            if ("geolocation" in navigator) {
                updateGpsStatus('pending', 'Conectando con GPS...');
                watchId = navigator.geolocation.watchPosition(
                    (position) => {
                        updateGpsStatus('active', `GPS Activo (Precisión: ±${Math.round(position.coords.accuracy)}m)`);
                        const lat = position.coords.latitude;
                        const lng = position.coords.longitude;
                        const accuracy = position.coords.accuracy;

                        const userLatLng = [lat, lng];

                        if (!userMarker) {
                            const userIcon = L.divIcon({
                                className: 'user-marker',
                                iconSize: [16, 16],
                                iconAnchor: [8, 8]
                            });
                            userMarker = L.marker(userLatLng, { icon: userIcon, zIndexOffset: 1000 }).addTo(map);
                            userCircle = L.circle(userLatLng, { radius: accuracy, color: '#2196F3', weight: 1, fillColor: '#2196F3', fillOpacity: 0.2 }).addTo(map);
                            map.setView(userLatLng, 18);
                        } else {
                            userMarker.setLatLng(userLatLng);
                            userCircle.setLatLng(userLatLng);
                            userCircle.setRadius(accuracy);
                        }
                    },
                    (error) => {
                        console.error("Error obteniendo ubicación: ", error);
                        let msg = 'Error GPS desconocido';
                        if (error.code === 1) msg = 'Permiso GPS denegado. Revisa los permisos de Chrome.';
                        if (error.code === 2) msg = 'Ubicación GPS no disponible.';
                        if (error.code === 3) msg = 'Tiempo de espera agotado buscando GPS.';
                        if (window.location.protocol === 'file:' && error.code === 1) {
                            msg = 'Chrome bloquea el GPS en archivos descargados (file://). Súbelo a internet o usa Firefox.';
                        }
                        updateGpsStatus('error', msg);
                    },
                    {
                        enableHighAccuracy: true,
                        maximumAge: 0,
                        timeout: 10000
                    }
                );
            } else {
                updateGpsStatus('error', 'Tu navegador no soporta geolocalización.');
            }
        }

        document.getElementById('btnLocation').addEventListener('click', () => {
            if (userMarker) {
                map.setView(userMarker.getLatLng(), 19);
            } else {
                startTracking();
            }
        });

        // Iniciar rastreo al cargar
        startTracking();

        // Manejo de CSV
        document.getElementById('csvFileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            Papa.parse(file, {
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    markersLayer.clearLayers(); // Limpiar marcadores anteriores
                    const data = results.data;
                    
                    data.forEach(row => {
                        const lat = parseFloat(row['Lat']);
                        const lng = parseFloat(row['Lng']);
                        
                        if (isNaN(lat) || isNaN(lng)) return;

                        const popupContent = `
                            <div class="popup-content">
                                <h3>${row['Especie']}</h3>
                                <p><strong>Equipo:</strong> ${row['Equipo']}</p>
                                <p><strong>Micrositio:</strong> ${row['Micrositio']}</p>
                                <p><strong>Orientación:</strong> ${row['Orientación']}</p>
                                <p><strong>Semillas/Hoyo:</strong> ${row['Semillas/Hoyo']}</p>
                                <p><strong>Protector:</strong> ${row['Protector']}</p>
                                <p><strong>Sustrato:</strong> ${row['Sustrato']}</p>
                                <p><strong>Golpes:</strong> ${row['Golpes']}</p>
                                ${row['Notas'] ? `<p><strong>Notas:</strong> ${row['Notas']}</p>` : ''}
                            </div>
                        `;

                        const marker = L.marker([lat, lng], { icon: seedIcon })
                            .bindPopup(popupContent);
                        
                        markersLayer.addLayer(marker);
                    });

                    // Ajustar mapa para mostrar todos los puntos
                    if (markersLayer.getLayers().length > 0) {
                        map.fitBounds(markersLayer.getBounds(), { padding: [50, 50] });
                    }
                }
            });
        });
    </script>
</body>
</html>

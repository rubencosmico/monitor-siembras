<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Monitorización de Supervivencia</title>
    
    <!-- PWA Manifest & Theme Color -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2196F3">
    <link rel="apple-touch-icon" href="icon.svg">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <!-- Leaflet MarkerCluster CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
    <!-- GPS Status -->
    <div id="gps-status">
        <div class="status-dot" id="gps-dot"></div>
        <span id="gps-text">Buscando señal GPS...</span>
    </div>

    <!-- Radar UI -->
    <div id="radar-ui">
        📍 A <span id="radar-dist">0</span> metros
    </div>

    <div id="map"></div>
    
    <!-- Main Controls -->
    <div class="controls">
        <label class="btn" for="csvFileInput">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
            Cargar CSV
        </label>
        <input type="file" id="csvFileInput" accept=".csv" />
        
        <button class="btn btn-location" id="btnLocation">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="3"></circle></svg>
            Centrar
        </button>

        <button class="btn btn-filter" id="btnFilter" style="background:#673ab7;" title="Filtrar Mapa">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg>
        </button>

        <button class="btn" id="btnExport" style="background:#ff9800;" title="Exportar CSV Auditado">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
        </button>
    </div>

    <!-- Bottom Sheet para Auditoría -->
    <div id="bottom-sheet">
        <div class="sheet-header">
            <h3 id="sheet-title">Detalle Semilla</h3>
            <button class="close-btn" id="btn-close-sheet">&times;</button>
        </div>
        
        <div id="sheet-details" class="sheet-details">
            <!-- Detalles inyectados por JS -->
        </div>
        
        <div class="status-buttons">
            <button class="btn-status btn-supervive" data-status="supervive">🌱 Supervive</button>
            <button class="btn-status btn-germinada" data-status="germinada">🌿 Germinada</button>
            <button class="btn-status btn-danada" data-status="danada">⚠️ Dañada</button>
            <button class="btn-status btn-fallida" data-status="fallida">💀 Fallida</button>
        </div>
        
        <div class="extra-inputs">
            <input type="text" id="audit-note" class="note-input" placeholder="Notas (toca micro para dictar)..." />
            <button class="icon-btn" id="btn-mic">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
            </button>
            <button class="icon-btn" id="btn-camera">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
            </button>
            <input type="file" id="camera-input" accept="image/*" capture="environment" style="display:none;" />
        </div>
    </div>

    <!-- Filter Modal -->
    <div id="filter-modal" class="modal-overlay">
        <div class="modal-content">
            <h3 style="margin-top:0; color:#4caf50;">Filtros de Mapa</h3>
            <button class="close-btn" id="btn-close-modal" style="position: absolute; top: 15px; right: 20px;">&times;</button>
            
            <div class="filter-group">
                <label>Especie</label>
                <select id="filter-especie"><option value="">Todas</option></select>
            </div>
            <div class="filter-group">
                <label>Equipo</label>
                <select id="filter-equipo"><option value="">Todos</option></select>
            </div>
            <div class="filter-group">
                <label>Estado Auditoría</label>
                <select id="filter-estado">
                    <option value="">Todos</option>
                    <option value="pending">Pendiente</option>
                    <option value="supervive">Supervive</option>
                    <option value="germinada">Germinada</option>
                    <option value="danada">Dañada</option>
                    <option value="fallida">Fallida</option>
                </select>
            </div>
            
            <button class="btn" id="btn-apply-filters" style="width: 100%; margin-top: 20px; justify-content: center;">Aplicar Filtros</button>
        </div>
    </div>

    <!-- PWA Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW registrado', reg))
                    .catch(err => console.error('SW error', err));
            });
        }
    </script>

    <!-- External Libraries -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>

    <!-- Custom Logic -->
    <script src="js/store.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
